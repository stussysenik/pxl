<svg xmlns="http://www.w3.org/2000/svg" width="680" height="240" viewBox="0 0 680 240">
  <style>
    .bg { fill: #1e1e2e; rx: 10; }
    .bar { fill: #313244; }
    .dot-r { fill: #f38ba8; }
    .dot-y { fill: #f9e2af; }
    .dot-g { fill: #a6e3a1; }
    text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
    .prompt { fill: #89b4fa; }
    .cmd { fill: #cdd6f4; }
    .dim { fill: #6c7086; }
    .green { fill: #a6e3a1; }
    .yellow { fill: #f9e2af; }
    .file { fill: #cdd6f4; }
  </style>
  <rect class="bg" width="680" height="240"/>
  <rect class="bar" x="0" y="0" width="680" height="32" rx="10"/>
  <rect class="bg" x="0" y="22" width="680" height="12"/>
  <circle class="dot-r" cx="20" cy="16" r="6"/>
  <circle class="dot-y" cx="40" cy="16" r="6"/>
  <circle class="dot-g" cx="60" cy="16" r="6"/>
  <text x="300" y="20" fill="#6c7086" text-anchor="middle" font-size="12">pxl</text>

  <!-- Line 1: pxl screenshot.png -->
  <text y="62" x="20">
    <tspan class="prompt">$</tspan>
    <tspan class="cmd"> pxl screenshot.png</tspan>
  </text>
  <text y="84" x="20">
    <tspan class="green">12 KB</tspan>
    <tspan class="file">  pxl-20260303-143022.avif</tspan>
  </text>

  <!-- Line 2: pxl -q 40 hero.png -->
  <text y="116" x="20">
    <tspan class="prompt">$</tspan>
    <tspan class="cmd"> pxl -q 40 hero.png</tspan>
  </text>
  <text y="138" x="20">
    <tspan class="green">6 KB</tspan>
    <tspan class="file">  pxl-20260303-143025.avif</tspan>
  </text>

  <!-- Line 3: pxl *.png (batch) -->
  <text y="170" x="20">
    <tspan class="prompt">$</tspan>
    <tspan class="cmd"> pxl *.png</tspan>
  </text>
  <text y="192" x="20">
    <tspan class="green">14 KB</tspan>
    <tspan class="file">  pxl-20260303-143030.avif</tspan>
  </text>
  <text y="214" x="20">
    <tspan class="yellow">38 KB</tspan>
    <tspan class="file">  pxl-20260303-143031.avif</tspan>
  </text>
</svg>
